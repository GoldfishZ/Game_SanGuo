# 长时多阵容 self-play：Ctrl+C 时自动保存 latest checkpoint。
# 0 表示不设置 update 和墙钟时间上限。
stage: selfplay
seed: 20260724
device: cuda
num_workers: 8
rollout_steps: 32768
minibatch_size: 256
artifact_root: artifacts/rl/multi_roster_v1

max_updates: 0
schedule_updates: 2000
max_wallclock_minutes: 0

eval_every: 40
eval_episodes: 512
eval_mirror_episodes: 256
eval_max_steps: 8192
eval_max_seconds: 900
checkpoint_every: 20
keep_last: 20
min_delta: 0.005

learning_rate: 0.0002
learning_rate_final: 0.00003
entropy_coef: 0.025
entropy_coef_final: 0.004
epochs: 4
target_kl: 0.02
gamma: 0.99
gae_lambda: 0.95
clip_ratio: 0.2
value_coef: 0.5
grad_clip: 0.5

# team_size: 0 开启多阵容；人数只受这里的覆盖范围、8费和12阵位约束。
team_size: 0
min_team_size: 1
max_team_size: 8
team_size_power: 1.0
roster_candidate_samples: 512
roster_cost_bias: 0.80
cost_limit: 8.0
max_turns: 240
roster_repeat_episodes: 2
mirror_ratio: 0.20

reward_hp_delta: 0.05
reward_kill: 0.15
reward_action_success: 0.005
reward_no_progress: -0.02
reward_fence_delta: 0.10
reward_shield_delta: 0.02
reward_effect_delta: 0.01
reward_win: 1.0
reward_lose: -1.0
reward_draw: 0.0

selfplay_current_ratio: 0.40
selfplay_heuristic_ratio: 0.15
selfplay_random_ratio: 0.10
selfplay_pool_size: 32
selfplay_top_k: 12
selfplay_temperature: 0.08
selfplay_snapshot_every: 20
